<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会话管理 — bestfps</title>
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .dash-topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: var(--nav-bg); backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--nav-border);
    }
    .dash-logo { font-size: 1.125rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .dash-logo span { color: var(--accent); }
    .dash-theme-btns { display: flex; gap: 4px; }
    .dash-theme-btn {
      padding: 5px 12px; font-size: 0.75rem; font-weight: 600;
      border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
      background: transparent; color: var(--text-secondary); font-family: inherit;
      transition: all 0.15s;
    }
    .dash-theme-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .dash-main {
      padding-top: 52px;
      min-height: 100vh;
      background: var(--bg);
      transition: background 0.3s, color 0.3s;
    }

    .page-header {
      padding: 40px 40px 24px;
      border-bottom: 1px solid var(--border);
    }
    .page-header h1 {
      font-size: 1.875rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .page-header p { color: var(--text-secondary); font-size: 0.9375rem; }

    .page-content {
      padding: 32px 40px;
      max-width: 900px;
    }

    .sessions-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .sessions-card-header {
      padding: 16px 24px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sessions-card-header h3 {
      font-size: 1rem; font-weight: 600;
    }
    .current-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.75rem; font-weight: 600;
      background: var(--success-bg); color: var(--success);
      border: 1px solid var(--success-border);
      padding: 3px 10px; border-radius: 980px;
    }

    .session-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.15s;
    }
    .session-item:last-child { border-bottom: none; }
    .session-item:hover { background: var(--card-hover); }

    .session-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: 1.25rem; flex-shrink: 0;
    }

    .session-info { flex: 1; min-width: 0; }
    .session-device {
      font-size: 0.9375rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 0.8125rem; color: var(--text-secondary); margin-top: 2px;
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .session-meta span { display: flex; align-items: center; gap: 4px; }

    .session-actions { flex-shrink: 0; }

    .btn-revoke {
      padding: 6px 14px; font-size: 0.8125rem; font-weight: 600;
      border: 1px solid var(--error); background: transparent;
      color: var(--error); border-radius: 8px; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-revoke:hover { background: var(--error); color: #fff; }
    .btn-revoke:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-revoke-all {
      padding: 8px 18px; font-size: 0.875rem; font-weight: 600;
      border: 1px solid var(--border); background: transparent;
      color: var(--text); border-radius: 8px; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-revoke-all:hover { background: var(--error); color: #fff; border-color: var(--error); }

    .alert { padding: 12px 16px; border-radius: 12px; font-size: 0.875rem; margin-bottom: 20px; display: none; }
    .alert.visible { display: flex; align-items: center; gap: 10px; }
    .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .alert-error { background: var(--error-bg); color: var(--error); border: 1px solid var(--error-border); }
    .alert-info { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(0,113,227,0.2); }

    .empty-state {
      text-align: center; padding: 60px 24px; color: var(--text-secondary);
    }
    .empty-state svg { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 1.125rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 0.9375rem; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--accent); font-size: 0.875rem; font-weight: 500;
      text-decoration: none; margin-bottom: 24px; transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent-hover); }

    @media (max-width: 640px) {
      .page-header { padding: 24px 16px 16px; }
      .page-content { padding: 20px 16px; }
      .session-item { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <!-- Top Nav -->
  <nav class="dash-topnav">
    <a href="/dashboard" class="dash-logo">best<span>fps</span></a>
    <div class="dash-theme-btns">
      <button class="dash-theme-btn" id="theme-light" onclick="setTheme('light')">☀️</button>
      <button class="dash-theme-btn" id="theme-dark" onclick="setTheme('dark')">🌙</button>
    </div>
  </nav>

  <div class="dash-main">
    <div class="page-header">
      <a href="/dashboard" class="back-link">← 返回控制台</a>
      <h1>会话管理</h1>
      <p>管理你账号的活跃登录会话。吊销不需要的会话可以保护账号安全。</p>
    </div>

    <div class="page-content">
      <div id="alert-success" class="alert alert-success"></div>
      <div id="alert-error" class="alert alert-error"></div>

      <div id="sessions-list"></div>
    </div>
  </div>

  <script>
    // Theme
    function getTheme() { return localStorage.getItem('theme') || 'light'; }
    function setTheme(t) {
      localStorage.setItem('theme', t);
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('theme-light').classList.toggle('active', t === 'light');
      document.getElementById('theme-dark').classList.toggle('active', t === 'dark');
    }
    setTheme(getTheme());

    // Auth
    function getToken() { return localStorage.getItem('token'); }
    async function api(method, path, body) {
      const res = await fetch('/api/auth' + path, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    function show(id, html) {
      const el = document.getElementById(id);
      el.innerHTML = html;
      el.classList.add('visible');
    }
    function hide(id) {
      const el = document.getElementById(id);
      el.classList.remove('visible');
    }

    // Parse user agent
    function parseUA(ua) {
      let os = 'Unknown OS', browser = 'Unknown Browser', icon = '💻';
      if (/windows/i.test(ua)) os = 'Windows';
      else if (/mac/i.test(ua)) os = 'macOS';
      else if (/linux/i.test(ua)) os = 'Linux';
      else if (/android/i.test(ua)) os = 'Android';
      else if (/iphone|ipad/i.test(ua)) os = 'iOS';

      if (/chrome/i.test(ua) && !/edge/i.test(ua)) browser = 'Chrome';
      else if (/safari/i.test(ua) && !/chrome/i.test(ua)) browser = 'Safari';
      else if (/firefox/i.test(ua)) browser = 'Firefox';
      else if (/edge/i.test(ua)) browser = 'Edge';

      if (/mobile|android|iphone|ipad/i.test(ua)) icon = '📱';
      else icon = '💻';

      return { os, browser, icon };
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function timeAgo(dateStr) {
      const now = Date.now();
      const diff = now - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return `${mins} 分钟前`;
      if (hours < 24) return `${hours} 小时前`;
      return `${days} 天前`;
    }

    async function loadSessions() {
      try {
        const data = await api('GET', '/sessions');
        renderSessions(data.sessions);
      } catch (err) {
        if (err.message.includes('登录') || err.message.includes('401') || err.message.includes('Unauthorized')) {
          window.location.href = '/login';
          return;
        }
        show('alert-error', '加载会话失败: ' + err.message);
      }
    }

    function renderSessions(sessions) {
      const container = document.getElementById('sessions-list');
      if (!sessions || sessions.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div>🔐</div>
            <h3>没有其他会话</h3>
            <p>你的账号目前只有一个活跃会话。</p>
          </div>`;
        return;
      }

      let html = `
        <div class="sessions-card">
          <div class="sessions-card-header">
            <h3>活跃会话</h3>
            <button class="btn-revoke-all" onclick="revokeAll()">吊销所有其他会话</button>
          </div>`;

      sessions.forEach(s => {
        const { icon, os, browser } = parseUA(s.user_agent || '');
        const deviceName = os + ' / ' + browser;
        html += `
          <div class="session-item" id="session-${s.id}">
            <div class="session-icon">${icon}</div>
            <div class="session-info">
              <div class="session-device">${deviceName}</div>
              <div class="session-meta">
                <span>🕐 ${timeAgo(s.created_at)}</span>
                ${s.ip_address ? `<span>🌐 ${s.ip_address}</span>` : ''}
                ${s.is_current ? '<span class="current-badge">✓ 当前会话</span>' : ''}
              </div>
            </div>
            <div class="session-actions">
              <button class="btn-revoke" onclick="revokeSession('${s.id}')" ${s.is_current ? 'disabled' : ''}>
                ${s.is_current ? '当前' : '吊销'}
              </button>
            </div>
          </div>`;
      });

      html += `</div>`;
      container.innerHTML = html;
    }

    async function revokeSession(id) {
      if (!confirm('确定要吊销这个会话吗？')) return;
      try {
        await api('DELETE', `/sessions/${id}`);
        const el = document.getElementById('session-' + id);
        if (el) el.remove();
        show('alert-success', '会话已吊销');
        setTimeout(() => hide('alert-success'), 3000);
      } catch (err) {
        show('alert-error', err.message);
      }
    }

    async function revokeAll() {
      if (!confirm('确定要吊销所有其他会话吗？此操作无法撤销。')) return;
      try {
        await api('DELETE', '/sessions');
        show('alert-success', '所有其他会话已吊销');
        setTimeout(() => { window.location.reload(); }, 1000);
      } catch (err) {
        show('alert-error', err.message);
      }
    }

    loadSessions();
  </script>
</body>
</html>
