<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>重置密码 — bestfps</title>
  <script>
    const saved = localStorage.getItem('theme') || 'system';
    if (saved === 'dark' || (saved === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">best<span>fps</span></a>
      <ul class="nav-links">
        <li><a href="/login">登录</a></li>
        <li><a href="/register">注册</a></li>
      </ul>
    </div>
  </nav>

  <main class="main">
    <div class="auth-card" id="reset-card">
      <div class="auth-icon">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="28" r="28" fill="#f5f5f7"/>
          <rect x="18" y="24" width="20" height="16" rx="3" stroke="#0071e3" stroke-width="2.5" fill="none"/>
          <path d="M22 24v-4a6 6 0 0 1 12 0v4" stroke="#0071e3" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <circle cx="28" cy="32" r="2" fill="#0071e3"/>
        </svg>
      </div>
      <h1 class="auth-title">重置密码</h1>
      <p class="auth-subtitle" id="subtitle">设置你的新密码</p>

      <div id="alert-success" class="alert alert-success"></div>
      <div id="alert-error"   class="alert alert-error"></div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="password">新密码</label>
          <input
            class="form-input"
            id="password"
            type="password"
            placeholder="至少 6 位"
            autocomplete="new-password"
            required
          />
          <p id="password-error" class="form-error"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">确认密码</label>
          <input
            class="form-input"
            id="confirm"
            type="password"
            placeholder="再次输入密码"
            autocomplete="new-password"
            required
          />
          <p id="confirm-error" class="form-error"></p>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span id="btn-text">确认重置</span>
        </button>
      </form>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('reset-card').innerHTML = `
        <div class="auth-success">
          <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="28" cy="28" r="28" fill="#f5f5f7"/>
            <circle cx="28" cy="28" r="18" fill="none" stroke="#ff3b30" stroke-width="3"/>
            <path d="M20 20l16 16M36 20L20 36" stroke="#ff3b30" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <h2>链接无效</h2>
          <p>重置链接不完整或已被使用。<br><a href="/forgot-password" style="color:var(--accent);">重新申请重置</a></p>
        </div>
      `;
    }

    function show(id, html) {
      const el = document.getElementById(id);
      el.innerHTML = html;
      el.classList.add('visible');
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hide('alert-success');
      hide('alert-error');

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn       = document.getElementById('submit-btn');
      const btnText   = document.getElementById('btn-text');

      document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; el.classList.remove('visible'); });
      document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));

      let hasError = false;
      if (!password || password.length < 6) {
        document.getElementById('password-error').textContent = '密码至少 6 位';
        document.getElementById('password-error').classList.add('visible');
        document.getElementById('password').classList.add('error');
        hasError = true;
      }
      if (password !== confirm) {
        document.getElementById('confirm-error').textContent = '两次输入的密码不一致';
        document.getElementById('confirm-error').classList.add('visible');
        document.getElementById('confirm').classList.add('error');
        hasError = true;
      }
      if (hasError) return;

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '请求失败');

        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('subtitle').textContent = '密码已重置';
        show('alert-success', `<strong>密码重置成功！</strong> 现在可以使用新密码 <a href="/login" style="color:var(--accent);">登录账号</a>。`);
      } catch (err) {
        show('alert-error', err.message);
        btn.disabled = false;
        btnText.textContent = '确认重置';
      }
    });
  </script>
</body>
</html>
