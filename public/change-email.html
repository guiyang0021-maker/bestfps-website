<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>确认邮箱修改 — bestfps</title>
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .ce-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: var(--nav-bg); backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--nav-border);
    }
    .ce-logo { font-size: 1.125rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .ce-logo span { color: var(--accent); }

    .ce-page {
      padding-top: 52px;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, var(--hero-gradient-from) 0%, var(--bg) 50%);
    }

    .ce-card {
      width: 100%; max-width: 480px; margin: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 48px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ce-icon {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 2.5rem;
    }
    .ce-icon.success { background: var(--success-bg); }
    .ce-icon.error { background: var(--error-bg); }
    .ce-icon.info { background: var(--accent-light); }

    .ce-card h1 {
      font-size: 1.625rem; font-weight: 700;
      letter-spacing: -0.02em; margin-bottom: 12px;
    }
    .ce-card p {
      color: var(--text-secondary); font-size: 0.9375rem;
      line-height: 1.6; margin-bottom: 28px;
    }

    .ce-detail {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 28px; text-align: left;
    }
    .ce-detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0;
    }
    .ce-detail-row:not(:last-child) { border-bottom: 1px solid var(--border-light); padding-bottom: 10px; margin-bottom: 6px; }
    .ce-detail-label { font-size: 0.8125rem; color: var(--text-secondary); }
    .ce-detail-value { font-size: 0.875rem; font-weight: 600; color: var(--text); }

    .alert { padding: 12px 16px; border-radius: 12px; font-size: 0.875rem; margin-bottom: 20px; display: none; align-items: center; gap: 10px; }
    .alert.visible { display: flex; }
    .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .alert-error { background: var(--error-bg); color: var(--error); border: 1px solid var(--error-border); }

    .ce-card .btn {
      width: 100%; padding: 13px; border-radius: 12px;
      font-size: 1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .ce-card .btn-primary { background: var(--accent); color: #fff; }
    .ce-card .btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-accent); }
    .ce-card .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .ce-card .btn-secondary:hover { background: var(--surface-hover); }

    .ce-card .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .ce-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    .ce-resend { font-size: 0.875rem; color: var(--text-secondary); margin-top: 16px; }
    .ce-resend a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .ce-resend a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .ce-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav class="ce-nav">
    <a href="/" class="ce-logo">best<span>fps</span></a>
    <div style="display:flex;gap:8px;">
      <a href="/login" style="padding:6px 16px;font-size:0.8125rem;font-weight:600;border-radius:980px;border:1px solid var(--border);background:transparent;color:var(--text);text-decoration:none;transition:background 0.15s;" onmouseover="this.style.background='var(--surface-hover)'" onmouseout="this.style.background='transparent'">登录</a>
    </div>
  </nav>

  <div class="ce-page">
    <div class="ce-card" id="card"></div>
  </div>

  <script>
    function getTheme() { return localStorage.getItem('theme') || 'system'; }
    function applyTheme() {
      const t = getTheme();
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    }
    applyTheme();

    function getTokenParam() {
      return new URLSearchParams(window.location.search).get('token');
    }

    function renderLoading() {
      document.getElementById('card').innerHTML = `
        <div class="ce-icon info">⏳</div>
        <h1>处理中...</h1>
        <p>正在验证你的邮箱修改请求，请稍候。</p>`;
    }

    function renderSuccess(newEmail) {
      document.getElementById('card').innerHTML = `
        <div class="ce-icon success">✅</div>
        <h1>邮箱修改成功</h1>
        <p>你的 bestfps 账号邮箱已成功修改为 <strong>${newEmail}</strong>。<br/>你可以使用新邮箱登录了。</p>
        <div class="ce-actions">
          <a href="/dashboard" class="btn btn-primary">前往控制台</a>
          <a href="/login" class="btn btn-secondary">重新登录</a>
        </div>`;
    }

    function renderError(title, message) {
      document.getElementById('card').innerHTML = `
        <div class="ce-icon error">❌</div>
        <h1>${title}</h1>
        <p>${message}</p>
        <div class="ce-actions">
          <a href="/" class="btn btn-primary">返回首页</a>
          <a href="/settings" class="btn btn-secondary">账号设置</a>
        </div>`;
    }

    function renderExpired() {
      document.getElementById('card').innerHTML = `
        <div class="ce-icon error">⏰</div>
        <h1>链接已过期</h1>
        <p>邮箱修改链接已过期。请前往账号设置重新发起邮箱修改请求。</p>
        <div class="ce-actions">
          <a href="/dashboard" class="btn btn-primary">前往控制台</a>
        </div>
        <p class="ce-resend">链接已过期？<a href="/dashboard">重新发送验证邮件</a></p>`;
    }

    async function api(path, options = {}) {
      const token = getTokenParam();
      const res = await fetch('/api/auth' + path + (token ? '?token=' + encodeURIComponent(token) : ''), {
        ...options,
        headers: { 'Content-Type': 'application/json', ...options.headers },
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    async function confirmEmailChange() {
      renderLoading();
      try {
        const data = await api('/confirm-email-change', { method: 'POST' });
        renderSuccess(data.email || data.new_email || '新邮箱');
      } catch (err) {
        if (err.message.includes('过期') || err.message.includes('expired') || err.message.includes('invalid')) {
          renderExpired();
        } else {
          renderError('修改失败', err.message);
        }
      }
    }

    // Auto-confirm on page load
    confirmEmailChange();
  </script>
</body>
</html>
