<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>查看配置分享 — bestfps</title>
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .share-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      background: var(--nav-bg); backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--nav-border);
    }
    .share-logo { font-size: 1.125rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .share-logo span { color: var(--accent); }
    .share-nav-actions { display: flex; gap: 8px; }
    .share-nav-btn {
      padding: 6px 16px; font-size: 0.8125rem; font-weight: 600;
      border-radius: 980px; cursor: pointer; font-family: inherit; transition: all 0.15s;
      border: none; text-decoration: none; display: inline-flex; align-items: center;
    }
    .share-nav-btn.primary { background: var(--accent); color: #fff; }
    .share-nav-btn.primary:hover { background: var(--accent-hover); }
    .share-nav-btn.ghost {
      background: transparent; color: var(--text); border: 1px solid var(--border);
    }
    .share-nav-btn.ghost:hover { background: var(--surface-hover); }

    .share-hero {
      padding-top: 52px;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--hero-gradient-from) 0%, var(--bg) 40%);
      display: flex; align-items: center; justify-content: center;
      padding: 80px 24px;
    }

    .share-card {
      width: 100%; max-width: 640px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .share-header {
      text-align: center; margin-bottom: 32px;
    }
    .share-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: var(--accent);
      margin: 0 auto 16px;
    }
    .share-header h1 {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .share-header p { color: var(--text-secondary); font-size: 0.9375rem; }
    .share-meta {
      display: flex; justify-content: center; gap: 20px; margin-top: 12px; flex-wrap: wrap;
    }
    .share-meta-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8125rem; color: var(--text-tertiary);
    }

    .share-section {
      margin-bottom: 28px;
    }
    .share-section-title {
      font-size: 0.8125rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text-secondary); margin-bottom: 12px;
    }

    .shader-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px;
    }
    .shader-name { font-size: 0.9375rem; font-weight: 600; }
    .shader-value { font-size: 0.875rem; color: var(--accent); font-weight: 500; }

    .resource-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px;
    }
    .resource-name { font-size: 0.875rem; font-weight: 500; color: var(--text); }

    .share-divider {
      border: none; border-top: 1px solid var(--border); margin: 24px 0;
    }

    .share-actions {
      display: flex; gap: 12px;
    }
    .share-actions .btn {
      flex: 1; padding: 13px; font-size: 0.9375rem; font-weight: 600;
      border-radius: 12px; border: none; cursor: pointer; font-family: inherit;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .share-actions .btn-primary { background: var(--accent); color: #fff; }
    .share-actions .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-accent); }
    .share-actions .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .share-actions .btn-secondary:hover { background: var(--surface-hover); }

    .share-error {
      text-align: center; padding: 60px 24px;
    }
    .share-error-icon { font-size: 4rem; margin-bottom: 16px; }
    .share-error h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .share-error p { color: var(--text-secondary); }

    .share-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;
    }
    .share-stat {
      text-align: center; padding: 16px 8px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px;
    }
    .share-stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .share-stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

    .alert {
      padding: 12px 16px; border-radius: 12px; font-size: 0.875rem;
      margin-bottom: 20px; display: none; align-items: center; gap: 10px;
    }
    .alert.visible { display: flex; }
    .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .alert-error { background: var(--error-bg); color: var(--error); border: 1px solid var(--error-border); }
    .alert-info { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(0,113,227,0.2); }

    .share-login-banner {
      background: var(--accent-light); border: 1px solid rgba(0,113,227,0.2);
      border-radius: 12px; padding: 16px; margin-bottom: 24px; text-align: center;
    }
    .share-login-banner p { font-size: 0.9375rem; color: var(--text-secondary); margin-bottom: 12px; }
    .share-login-banner .btn { width: auto; display: inline-flex; padding: 10px 24px; }

    @media (max-width: 640px) {
      .share-card { padding: 32px 24px; }
      .share-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav class="share-nav">
    <a href="/" class="share-logo">best<span>fps</span></a>
    <div class="share-nav-actions">
      <a href="/login" class="share-nav-btn ghost">登录</a>
      <a href="/register" class="share-nav-btn primary">注册</a>
    </div>
  </nav>

  <div class="share-hero">
    <div id="content"></div>
  </div>

  <script>
    let isLoggedIn = false;
    function getTheme() { return localStorage.getItem('theme') || 'system'; }
    function applyTheme() {
      const t = getTheme();
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    }
    applyTheme();

    async function api(path, options = {}) {
      const res = await fetch('/api/share' + path, {
        ...options,
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...options.headers },
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    function show(id, html) {
      const el = document.getElementById(id);
      if (el) { el.textContent = html; el.classList.add('visible'); }
    }
    function hide(id) {
      const el = document.getElementById(id);
      if (el) el.classList.remove('visible');
    }

    function formatDate(d) {
      return new Date(d).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value == null ? '' : String(value);
      return div.innerHTML;
    }

    function parseJsonField(value, fallback) {
      if (!value) return fallback;
      try {
        return JSON.parse(value);
      } catch (_) {
        return fallback;
      }
    }

    const token = new URLSearchParams(window.location.search).get('t') ||
                  window.location.pathname.split('/share/')[1] || '';

    async function loadAuthState() {
      try {
        const res = await fetch('/api/auth/me', {
          credentials: 'include',
          headers: { Accept: 'application/json' },
        });
        isLoggedIn = res.ok;
      } catch (_) {
        isLoggedIn = false;
      }
    }

    async function loadShare() {
      if (!token) {
        renderError('链接无效', '分享链接不完整，请检查后重试。');
        return;
      }

      try {
        const data = await api('/' + encodeURIComponent(token));
        renderShare(data);
      } catch (err) {
        renderError('分享不存在', '此分享链接已失效或已被删除。');
      }
    }

    function renderError(title, desc) {
      document.getElementById('content').innerHTML = `
        <div class="share-card">
          <div class="share-error">
            <div class="share-error-icon">🔗</div>
            <h2>${escapeHtml(title)}</h2>
            <p>${escapeHtml(desc)}</p>
            <a href="/" class="btn btn-secondary" style="display:inline-flex;margin-top:20px;padding:10px 24px;border-radius:12px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);text-decoration:none;font-weight:600;">返回首页</a>
          </div>
        </div>`;
    }

    function renderShare(data) {
      const share = data.share;
      const shaderSettings = parseJsonField(share.shader_settings, {});
      const resourcePacks = parseJsonField(share.resource_packs, []);
      // Update nav for logged in users
      if (isLoggedIn) {
        document.querySelector('.share-nav-actions').innerHTML = `
          <a href="/dashboard" class="share-nav-btn ghost">控制台</a>
          <a href="#" class="share-nav-btn ghost" id="share-logout-btn">退出</a>`;
      }

      // Render shader settings
      let shaderHtml = '';
      const knownShaders = {
        renderDistance: '渲染距离',
        simulationDistance: '模拟距离',
        entityDistance: '实体渲染距离',
        particles: '粒子效果',
        fps: '目标帧率',
        fullscreen: '全屏模式',
        vsync: '垂直同步',
        antiAliasing: '抗锯齿',
        maxFps: '最大 FPS',
        brightness: '亮度',
        gamma: '伽马值',
      };
      for (const [key, value] of Object.entries(shaderSettings)) {
        const label = escapeHtml(knownShaders[key] || key);
        const displayValue = typeof value === 'boolean' ? (value ? '开启' : '关闭') : escapeHtml(value);
        shaderHtml += `
          <div class="shader-item">
            <span class="shader-name">${label}</span>
            <span class="shader-value">${displayValue}</span>
          </div>`;
      }
      if (!shaderHtml) shaderHtml = '<p style="color:var(--text-tertiary);font-size:0.875rem;text-align:center;padding:12px;">暂无光影设置</p>';

      // Render resource packs
      let resourceHtml = '';
      if (Array.isArray(resourcePacks) && resourcePacks.length > 0) {
        resourcePacks.slice(0, 5).forEach(pack => {
          const packName = typeof pack === 'string' ? pack : (pack && pack.name) || '';
          resourceHtml += `
            <div class="resource-item">
              <span class="resource-name">📦 ${escapeHtml(packName)}</span>
              ${pack.enabled !== undefined ? `<span style="font-size:0.75rem;color:${pack.enabled ? 'var(--success)' : 'var(--text-tertiary)'}">${pack.enabled ? '已启用' : '已禁用'}</span>` : ''}
            </div>`;
        });
        if (resourcePacks.length > 5) {
          resourceHtml += `<p style="font-size:0.8125rem;color:var(--text-tertiary);text-align:center;padding:4px;">还有 ${resourcePacks.length - 5} 个资源包...</p>`;
        }
      } else {
        resourceHtml = '<p style="color:var(--text-tertiary);font-size:0.875rem;text-align:center;padding:12px;">暂无资源包</p>';
      }

      document.getElementById('content').innerHTML = `
        <div class="share-card">
          <div class="share-header">
            <div class="share-avatar">⚙️</div>
            <h1>${escapeHtml(share.title || (share.username + ' 的配置分享'))}</h1>
            <p>由 <strong>${escapeHtml(share.username)}</strong> 分享 · ${formatDate(share.created_at)}</p>
            <div class="share-meta">
              ${share.views > 0 ? `<span class="share-meta-item">👁️ ${share.views} 次浏览</span>` : ''}
              <span class="share-meta-item">🔗 ${share.use_count || 0} 次使用</span>
            </div>
          </div>

          ${share.description ? `<p style="text-align:center;color:var(--text-secondary);font-size:0.9375rem;margin-bottom:24px;">${escapeHtml(share.description)}</p>` : ''}

          <div class="share-stats">
            <div class="share-stat">
              <div class="share-stat-value">${Object.keys(shaderSettings).length}</div>
              <div class="share-stat-label">光影设置</div>
            </div>
            <div class="share-stat">
              <div class="share-stat-value">${Array.isArray(resourcePacks) ? resourcePacks.length : 0}</div>
              <div class="share-stat-label">资源包</div>
            </div>
            <div class="share-stat">
              <div class="share-stat-value">${share.views || 0}</div>
              <div class="share-stat-label">浏览量</div>
            </div>
          </div>

          <div class="share-section">
            <div class="share-section-title">光影设置</div>
            ${shaderHtml}
          </div>

          <div class="share-section">
            <div class="share-section-title">资源包</div>
            ${resourceHtml}
          </div>

          <hr class="share-divider" />

          ${!isLoggedIn ? `
          <div class="share-login-banner">
            <p>登录后可以将此配置导入到你的账号</p>
            <a href="/login" class="btn btn-primary" style="background:var(--accent);color:#fff;border:none;">登录 bestfps</a>
          </div>` : ''}

          <div id="alert-success" class="alert alert-success"></div>
          <div id="alert-error" class="alert alert-error"></div>

          <div class="share-actions">
            <button class="btn btn-secondary" type="button" data-share-action="copy">📋 复制链接</button>
            ${isLoggedIn ? `
              <button class="btn btn-primary" type="button" data-share-action="import">⬇️ 导入配置</button>
            ` : `
              <a href="/register" class="btn btn-primary" style="background:var(--accent);color:#fff;border:none;text-decoration:none;flex:1;padding:13px;font-size:0.9375rem;font-weight:600;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;">注册以导入配置</a>
            `}
          </div>
        </div>`;
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        show('alert-success', '链接已复制到剪贴板！');
        setTimeout(() => hide('alert-success'), 3000);
      }).catch(() => {
        show('alert-error', '复制失败，请手动复制。');
      });
    }

    async function importConfig() {
      const btn = document.querySelector('.share-actions .btn-primary');
      if (!btn || btn.textContent.includes('注册')) return;
      btn.disabled = true;
      btn.innerHTML = '<span style="display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;"></span> 导入中...';

      try {
        const data = await api('/' + encodeURIComponent(token) + '/import', {
          method: 'POST',
        });
        show('alert-success', '✅ 配置已成功导入到你的账号！');
        btn.innerHTML = '✓ 已导入';
        btn.disabled = true;
      } catch (err) {
        show('alert-error', err.message);
        btn.disabled = false;
        btn.textContent = '⬇️ 导入配置';
      }
    }

    async function logout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      } finally {
        window.location.reload();
      }
    }

    document.getElementById('content').addEventListener('click', (event) => {
      const action = event.target.closest('[data-share-action]');
      if (!action) return;
      if (action.dataset.shareAction === 'copy') copyLink();
      if (action.dataset.shareAction === 'import') importConfig();
    });

    document.querySelector('.share-nav-actions').addEventListener('click', (event) => {
      const logoutLink = event.target.closest('#share-logout-btn');
      if (!logoutLink) return;
      event.preventDefault();
      logout();
    });

    loadAuthState().finally(loadShare);
  </script>
</body>
</html>
