<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — bestfps</title>
  <script>
    const saved = localStorage.getItem('theme') || 'system';
    if (saved === 'dark' || (saved === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">best<span>fps</span></a>
      <ul class="nav-links">
        <li><a href="/#features">功能</a></li>
        <li><a href="/#comparison">对比</a></li>
        <li><a href="/#download">下载</a></li>
        <li><a href="/register">注册</a></li>
      </ul>
    </div>
  </nav>

  <main class="main">
    <div class="auth-card">
      <div class="auth-icon">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="28" r="28" fill="#f5f5f7"/>
          <path d="M28 18c-5.523 0-10 4.477-10 10s4.477 10 10 10 10-4.477 10-10-4.477-10-10-10zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z" fill="#0071e3"/>
          <circle cx="28" cy="28" r="3" fill="#0071e3"/>
        </svg>
      </div>
      <h1 class="auth-title">登录 bestfps</h1>
      <p class="auth-subtitle">还没有账号？<a href="/register">立即注册</a></p>

      <div id="alert-success" class="alert alert-success"></div>
      <div id="alert-error"   class="alert alert-error"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">邮箱</label>
          <input
            class="form-input"
            id="email"
            type="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
          />
          <p id="email-error" class="form-error"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input
            class="form-input"
            id="password"
            type="password"
            placeholder="输入密码"
            autocomplete="current-password"
            required
          />
          <p id="password-error" class="form-error"></p>
        </div>

        <div class="form-group" style="text-align:right; margin-bottom:20px;">
          <a href="/forgot-password" style="font-size:0.8125rem; color:var(--accent); text-decoration:none; font-weight:500;">
            忘记密码？
          </a>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span id="btn-text">登录</span>
        </button>
      </form>
    </div>
  </main>

  <script>
    const API = '/api/auth';

    async function api(method, path, body) {
      const res = await fetch(API + path, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    function show(id, html) {
      const el = document.getElementById(id);
      el.innerHTML = html;
      el.classList.add('visible');
    }
    function hide(id) {
      const el = document.getElementById(id);
      el.classList.remove('visible');
    }

    // ---- Real-time validation ----
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    emailInput.addEventListener('input', () => {
      const val = emailInput.value.trim();
      if (val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
        emailInput.classList.add('error');
        document.getElementById('email-error').textContent = '邮箱格式不正确';
        document.getElementById('email-error').classList.add('visible');
      } else {
        emailInput.classList.remove('error');
        document.getElementById('email-error').textContent = '';
        document.getElementById('email-error').classList.remove('visible');
      }
    });

    passwordInput.addEventListener('input', () => {
      if (passwordInput.value) {
        passwordInput.classList.remove('error');
        document.getElementById('password-error').textContent = '';
        document.getElementById('password-error').classList.remove('visible');
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hide('alert-success');
      hide('alert-error');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');
      const btnText  = document.getElementById('btn-text');

      // 清除旧错误
      document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; el.classList.remove('visible'); });
      document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));

      let hasError = false;
      if (!email) {
        document.getElementById('email-error').textContent = '请输入邮箱';
        document.getElementById('email-error').classList.add('visible');
        document.getElementById('email').classList.add('error');
        hasError = true;
      }
      if (!password) {
        document.getElementById('password-error').textContent = '请输入密码';
        document.getElementById('password-error').classList.add('visible');
        document.getElementById('password').classList.add('error');
        hasError = true;
      }
      if (hasError) return;

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';

      try {
        const data = await api('POST', '/login', { email, password });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        show('alert-success', '<strong>登录成功！</strong> 正在跳转到控制面板…');
        setTimeout(() => { window.location.href = '/dashboard'; }, 800);
      } catch (err) {
        show('alert-error', err.message);
        btn.disabled = false;
        btnText.textContent = '登录';
      }
    });
  </script>
</body>
</html>
