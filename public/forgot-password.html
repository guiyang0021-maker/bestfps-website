<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>忘记密码 — bestfps</title>
  <script>
    const saved = localStorage.getItem('theme') || 'system';
    if (saved === 'dark' || (saved === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">best<span>fps</span></a>
      <ul class="nav-links">
        <li><a href="/login">登录</a></li>
        <li><a href="/register">注册</a></li>
      </ul>
    </div>
  </nav>

  <main class="main">
    <div class="auth-card" id="forgot-card">
      <div class="auth-icon">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="28" r="28" fill="#f5f5f7"/>
          <rect x="16" y="20" width="24" height="20" rx="3" stroke="#0071e3" stroke-width="2.5" fill="none"/>
          <path d="M28 30v-4M28 34h.01" stroke="#0071e3" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="auth-title">忘记密码</h1>
      <p class="auth-subtitle" id="subtitle">输入你的注册邮箱，我们会发送重置链接</p>

      <div id="alert-success" class="alert alert-success"></div>
      <div id="alert-error"   class="alert alert-error"></div>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">邮箱</label>
          <input
            class="form-input"
            id="email"
            type="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
          />
          <p id="email-error" class="form-error"></p>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn" style="margin-top:8px;">
          <span id="btn-text">发送重置链接</span>
        </button>
      </form>

      <p class="auth-footer">
        <a href="/login">想起密码了？登录</a>
      </p>
    </div>
  </main>

  <script>
    function show(id, html) {
      const el = document.getElementById(id);
      el.innerHTML = html;
      el.classList.add('visible');
    }

    // ---- Real-time validation ----
    const emailInput = document.getElementById('email');
    emailInput.addEventListener('input', () => {
      const val = emailInput.value.trim();
      if (val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
        emailInput.classList.add('error');
        document.getElementById('email-error').textContent = '邮箱格式不正确';
        document.getElementById('email-error').classList.add('visible');
      } else {
        emailInput.classList.remove('error');
        document.getElementById('email-error').textContent = '';
        document.getElementById('email-error').classList.remove('visible');
      }
    });

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const el = document.getElementById('alert-success');
      el.classList.remove('visible');
      document.getElementById('alert-error').classList.remove('visible');

      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('submit-btn');
      const btnText = document.getElementById('btn-text');

      if (!email) {
        document.getElementById('email-error').textContent = '请输入邮箱';
        document.getElementById('email-error').classList.add('visible');
        document.getElementById('email').classList.add('error');
        return;
      }

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '请求失败');

        document.getElementById('forgot-form').style.display = 'none';
        document.getElementById('subtitle').textContent = '邮件已发送';
        show('alert-success', `<strong>重置链接已发送！</strong> 请查收邮件（如果邮箱存在的话），点击链接即可重置密码。`);
      } catch (err) {
        document.getElementById('alert-error').textContent = err.message;
        document.getElementById('alert-error').classList.add('visible');
        btn.disabled = false;
        btnText.textContent = '发送重置链接';
      }
    });
  </script>
</body>
</html>
