<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 — bestfps</title>
  <script>
    const saved = localStorage.getItem('theme') || 'system';
    if (saved === 'dark' || (saved === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <link rel="stylesheet" href="/css/themes.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">best<span>fps</span></a>
      <ul class="nav-links">
        <li><a href="/#features">功能</a></li>
        <li><a href="/#comparison">对比</a></li>
        <li><a href="/#download">下载</a></li>
        <li><a href="/login">登录</a></li>
      </ul>
    </div>
  </nav>

  <main class="main">
    <div class="auth-card">
      <div class="auth-icon">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="28" r="28" fill="#f5f5f7"/>
          <circle cx="28" cy="22" r="6" fill="#0071e3"/>
          <path d="M16 40c0-6.627 5.373-12 12-12s12 5.373 12 12" stroke="#0071e3" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <h1 class="auth-title">创建账号</h1>
      <p class="auth-subtitle">已有账号？<a href="/login">立即登录</a></p>

      <div id="alert-success" class="alert alert-success"></div>
      <div id="alert-error"   class="alert alert-error"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <input
            class="form-input"
            id="username"
            type="text"
            placeholder="3-20 个字符"
            autocomplete="username"
            maxlength="20"
            required
          />
          <p id="username-error" class="form-error"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">邮箱</label>
          <input
            class="form-input"
            id="email"
            type="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
          />
          <p id="email-error" class="form-error"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input
            class="form-input"
            id="password"
            type="password"
            placeholder="至少 6 位"
            autocomplete="new-password"
            required
          />
          <p id="password-error" class="form-error"></p>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn" style="margin-top:8px;">
          <span id="btn-text">注册</span>
        </button>
      </form>
    </div>
  </main>

  <script>
    const API = '/api/auth';

    async function api(method, path, body) {
      const res = await fetch(API + path, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    function show(id, html) {
      const el = document.getElementById(id);
      el.innerHTML = html;
      el.classList.add('visible');
    }
    function hide(id) {
      const el = document.getElementById(id);
      el.classList.remove('visible');
    }

    // ---- Real-time validation ----
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    usernameInput.addEventListener('input', () => {
      const val = usernameInput.value.trim();
      if (val && (val.length < 3 || val.length > 20)) {
        usernameInput.classList.add('error');
        document.getElementById('username-error').textContent = '用户名长度为 3-20 个字符';
        document.getElementById('username-error').classList.add('visible');
      } else {
        usernameInput.classList.remove('error');
        document.getElementById('username-error').textContent = '';
        document.getElementById('username-error').classList.remove('visible');
      }
    });

    emailInput.addEventListener('input', () => {
      const val = emailInput.value.trim();
      if (val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
        emailInput.classList.add('error');
        document.getElementById('email-error').textContent = '邮箱格式不正确';
        document.getElementById('email-error').classList.add('visible');
      } else {
        emailInput.classList.remove('error');
        document.getElementById('email-error').textContent = '';
        document.getElementById('email-error').classList.remove('visible');
      }
    });

    passwordInput.addEventListener('input', () => {
      if (passwordInput.value && passwordInput.value.length < 6) {
        passwordInput.classList.add('error');
        document.getElementById('password-error').textContent = '密码至少 6 位';
        document.getElementById('password-error').classList.add('visible');
      } else {
        passwordInput.classList.remove('error');
        document.getElementById('password-error').textContent = '';
        document.getElementById('password-error').classList.remove('visible');
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hide('alert-success');
      hide('alert-error');

      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');
      const btnText  = document.getElementById('btn-text');

      document.querySelectorAll('.form-error').forEach(el => { el.textContent = ''; el.classList.remove('visible'); });
      document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));

      let hasError = false;
      if (!username || username.length < 3 || username.length > 20) {
        document.getElementById('username-error').textContent = '用户名长度为 3-20 个字符';
        document.getElementById('username-error').classList.add('visible');
        document.getElementById('username').classList.add('error');
        hasError = true;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('email-error').textContent = '请输入正确的邮箱格式';
        document.getElementById('email-error').classList.add('visible');
        document.getElementById('email').classList.add('error');
        hasError = true;
      }
      if (!password || password.length < 6) {
        document.getElementById('password-error').textContent = '密码至少 6 位';
        document.getElementById('password-error').classList.add('visible');
        document.getElementById('password').classList.add('error');
        hasError = true;
      }
      if (hasError) return;

      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>';

      try {
        const data = await api('POST', '/register', { username, email, password });
        show('alert-success', `<strong>注册成功！</strong> 请查收验证邮件激活账号。`);
        document.getElementById('register-form').style.display = 'none';
      } catch (err) {
        show('alert-error', err.message);
        btn.disabled = false;
        btnText.textContent = '注册';
      }
    });
  </script>
</body>
</html>
